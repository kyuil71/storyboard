<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storyboard Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        /* --- 프린트 최적화 스타일 (window.print 기반) --- */
        @media print {
            /* 배경색 및 이미지 강제 출력 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 여백 및 사이즈 설정 (A4 세로) */
            @page { size: A4 portrait; margin: 0; }
            body { background: white !important; margin: 0; padding: 0; }
            
            /* 프린트 시 불필요한 UI 숨기기 */
            header, button, .no-print, .fixed, #storyboard-result, .alert-box { display: none !important; }
            
            /* PDF 레이아웃 강제 노출 */
            #hidden-pdf-layout { display: block !important; position: static !important; width: 100% !important; }
            
            /* 페이지 넘김 설정 */
            .pdf-page { 
                page-break-after: always !important; 
                break-after: page !important;
                display: flex !important;
                flex-direction: column !important;
                min-height: 296mm; /* A4 높이 */
                padding: 20mm !important;
                box-sizing: border-box !important;
                background: white !important;
            }
            .page-break-inside-avoid { page-break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Lucide Icon Component Wrapper ---
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const StoryboardApp = () => {
            // --- API Configuration ---
            const [userApiKey, setUserApiKey] = useState("");
            const [isConfigured, setIsConfigured] = useState(false);

            // --- Initial Data ---
            const defaultScenario = `[사례] 가정에서는 '프롬프트 기반 생활'이 일상화되었다. 
아침에 일어나면 홈 AI에게 "오늘의 기후 예측(습도 85%, 국지성 폭우 가능), 에너지 최적화 경로, 그리고 레디코어 기준에 맞는 의상 설계"를 프롬프트한다. 
이동 수단은 공유형 자율주행 포드로, 내부는 내가 설정한 '집'의 환경과 동일하게 동기화된다.
회사에 도착하면 물리적 책상은 없고, AR 글래스를 통해 나만의 작업 공간이 허공에 펼쳐진다.
점심시간, 식단 역시 나의 건강 데이터와 오전 업무 스트레스 지수에 맞춰 3D 프린팅된 영양식이 제공된다.
집에 돌아오면 AI가 하루 동안의 에너지 소비량과 프롬프트 효율성을 리포트로 보여준다.
잠들기 전, 내일의 날씨와 스케줄에 맞춰 침실의 온습도와 조명이 '수면 최적화 모드'로 서서히 바뀐다.`;

            // --- State Management ---
            const [inputScenario, setInputScenario] = useState(defaultScenario);
            const [sceneCount, setSceneCount] = useState(10); 
            const [scenes, setScenes] = useState([]);
            const [status, setStatus] = useState('idle'); // idle, analyzing, generating, complete, error
            const [viewMode, setViewMode] = useState('input'); // 'input' or 'results' navigation state
            const [progress, setProgress] = useState({ current: 0, total: 0, message: '' });
            const [errorMsg, setErrorMsg] = useState('');
            const [editingSceneId, setEditingSceneId] = useState(null);
            const [editDescription, setEditDescription] = useState('');
            const [editImageInstruction, setEditImageInstruction] = useState('');
            const [characterFeatures, setCharacterFeatures] = useState('');
            const [selectedImage, setSelectedImage] = useState(null);

            useEffect(() => {
                const handleFullScreenChange = () => {}; 
                document.addEventListener('fullscreenchange', handleFullScreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullScreenChange);
            }, []);

            // --- PDF 저장 로직 (window.print 기반) ---
            const handleDownloadPdf = async () => {
                const pdfLayout = document.getElementById('hidden-pdf-layout');
                if (!pdfLayout || scenes.length === 0) return;

                const images = Array.from(pdfLayout.querySelectorAll('img'));
                const imagePromises = images.map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                });

                const prevStatus = status;
                const prevView = viewMode;
                setStatus('printing'); 
                
                try {
                    await Promise.all(imagePromises);
                    setTimeout(() => {
                        window.focus(); 
                        window.print();
                        setStatus(prevStatus);
                    }, 500);
                } catch (err) {
                    console.error("Print Error:", err);
                    alert("인쇄 준비 중 오류가 발생했습니다.");
                    setStatus(prevStatus);
                }
            };

            const handleCopyPrompt = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) { console.error('Unable to copy', err); }
                document.body.removeChild(textArea);
            };

            const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            const analyzeScenario = async (text, count) => {
                // 수정된 스타일 지시어: 고해상도 시네마틱 실사 사진 스타일
                const styleInstruction = "hyper-realistic, photorealistic commercial photography, cinematic lighting, 8k resolution, ultra-detailed, sharp focus, ambient warm lighting, highly detailed modern lifestyle aesthetic, masterpiece, shot on 35mm lens, depth of field, natural colors, no cartoon, no illustration";
                const systemPrompt = `You are a professional storyboard artist. Analyze the scenario and split it into exactly ${count} chronological scenes.
                1. Define "characterFeatures" with an EXTREMELY specific physical description (age, exact hair style, strict facial hair status like 'clean-shaven with absolutely no beard or mustache', facial shape, and exact clothing). This is the permanent visual signature.
                2. In each scene's "imagePrompt", you MUST start by copying the EXACT "characterFeatures" word-for-word. NEVER change the character's facial features, hair, or clothing across scenes (e.g., do not randomly add or remove beards). Character consistency is ABSOLUTELY CRITICAL.
                3. Every "imagePrompt" must end with the mandatory style suffix: "${styleInstruction}".
                4. The "description" for each scene MUST be written in Korean (한국어) and consist of exactly two sentences.
                Return a valid JSON object with keys: "characterFeatures" and "scenes" (array of {id, description, imagePrompt}). Return ONLY raw JSON. Do NOT include markdown code blocks.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    if (!response.ok) throw new Error(`Scenario analysis failed: ${response.status}`);
                    const data = await response.json();
                    let resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!resultText) throw new Error('AI로부터 응답 데이터를 받지 못했습니다.');
                    
                    const jsonMatch = resultText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        return JSON.parse(jsonMatch[0]);
                    }
                    throw new Error("응답에서 유효한 JSON 형식을 찾을 수 없습니다.");
                } catch (error) { 
                    console.error("Analysis Error:", error); 
                    throw error;
                }
            };

            const generateImage = async (prompt, onRetryMessage) => {
                const maxRetries = 2; 
                let attempt = 0;
                const enhancedPrompt = `${prompt} --aspect_ratio 4:3`;
                while (attempt < maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${userApiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: enhancedPrompt }] }],
                                generationConfig: { responseModalities: ["IMAGE"] }
                            })
                        });
                        if (!response.ok) {
                            if (response.status === 429) {
                                const waitTime = 4000 * Math.pow(2, attempt); 
                                if (onRetryMessage) onRetryMessage(`사용량 제한. ${waitTime/1000}초 대기 중...`);
                                await delay(waitTime);
                                throw new Error("Rate limit exceeded"); 
                            }
                            return null;
                        }
                        const data = await response.json();
                        const base64Image = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        if (!base64Image) throw new Error('No image data returned');
                        return `data:image/png;base64,${base64Image}`;
                    } catch (error) {
                        attempt++;
                        if (attempt >= maxRetries) return null;
                        if (!error.message.includes("Rate limit")) await delay(1000);
                    }
                }
                return null;
            };

            const regenerateScenePrompt = async (description, imageInstruction) => {
                // 수정된 스타일 지시어: 고해상도 시네마틱 실사 사진 스타일
                const styleInstruction = "hyper-realistic, photorealistic commercial photography, cinematic lighting, 8k resolution, ultra-detailed, sharp focus, ambient warm lighting, highly detailed modern lifestyle aesthetic, masterpiece, shot on 35mm lens, depth of field, natural colors, no cartoon, no illustration";
                const systemPrompt = `Professional storyboard artist. You MUST strictly maintain these EXACT character features: ${characterFeatures}. NEVER change facial features, hair, or clothing (e.g., do not randomly add/remove beards). New prompt for Scene: ${description}. Instruction: ${imageInstruction}. 
                The prompt MUST start with the exact character details and end with the visual style: "${styleInstruction}". English raw prompt string only.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: '' }] }], 
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text.trim();
                } catch (error) { console.error("Prompt Regen Error:", error); throw error; }
            };

            const handleGenerate = async () => {
                if (!inputScenario.trim()) return;

                let wakeLock = null;
                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { console.warn("Wake Lock failed"); }
                }

                setStatus('analyzing');
                setViewMode('results'); // Switch to results view when generation starts
                setErrorMsg('');
                setProgress({ current: 0, total: sceneCount, message: 'AI가 시나리오를 분석하고 장면을 구성중입니다...' });
                setScenes([]);

                try {
                    const analysisResult = await analyzeScenario(inputScenario, sceneCount);
                    
                    let finalScenes = [];
                    if (analysisResult && Array.isArray(analysisResult.scenes)) {
                        finalScenes = analysisResult.scenes;
                    } else if (Array.isArray(analysisResult)) {
                        finalScenes = analysisResult;
                    } else if (analysisResult && typeof analysisResult === 'object') {
                        const possibleKey = Object.keys(analysisResult).find(key => Array.isArray(analysisResult[key]));
                        if (possibleKey) finalScenes = analysisResult[possibleKey];
                    }

                    if (finalScenes.length === 0) {
                        throw new Error("분석 데이터에서 장면 정보를 찾을 수 없습니다.");
                    }

                    const charFeats = analysisResult.characterFeatures || characterFeatures || '';
                    setCharacterFeatures(charFeats);
                    const initialScenes = finalScenes.map(scene => ({
                        ...scene, imageUrl: null, isLoading: true, imageInstruction: ''
                    }));
                    setScenes(initialScenes);
                    setStatus('generating');

                    const updatedScenes = [...initialScenes];
                    let consecutiveFailures = 0;
                    for (let i = 0; i < updatedScenes.length; i++) {
                        if (consecutiveFailures >= 3) {
                            updatedScenes[i] = { ...updatedScenes[i], isLoading: false, imageUrl: null };
                            setScenes([...updatedScenes]);
                            continue;
                        }
                        setProgress({ current: i + 1, total: updatedScenes.length, message: `${i + 1}번째 장면 생성 중...` });
                        const consistentPrompt = `${charFeats}. ${updatedScenes[i].imagePrompt}`;
                        if (i > 0) await delay(4000); 
                        const imageUrl = await generateImage(consistentPrompt, (msg) => setProgress(prev => ({ ...prev, message: msg })));
                        if (imageUrl === null) consecutiveFailures++; else consecutiveFailures = 0;
                        updatedScenes[i] = { ...updatedScenes[i], imagePrompt: consistentPrompt, imageUrl: imageUrl, isLoading: false };
                        setScenes([...updatedScenes]);
                    }
                    setStatus('complete');
                } catch (err) { 
                    setStatus('error'); 
                    setErrorMsg('작업 중 오류가 발생했습니다.\n' + (err.message || '데이터 처리 오류')); 
                } finally {
                    if (wakeLock) { wakeLock.release().then(() => { wakeLock = null; }); }
                }
            };

            const handleReset = () => { 
                if (confirm('모든 작업 내용이 삭제됩니다. 계속하시겠습니까?')) {
                    setStatus('idle'); 
                    setViewMode('input');
                    setScenes([]); 
                    setErrorMsg(''); 
                    setEditingSceneId(null); 
                    setCharacterFeatures(''); 
                    setSelectedImage(null); 
                }
            };
            
            const startEditing = (scene) => { setEditingSceneId(scene.id); setEditDescription(scene.description); setEditImageInstruction(scene.imageInstruction || ''); };
            const cancelEditing = () => { setEditingSceneId(null); setEditDescription(''); setEditImageInstruction(''); };

            const saveEditing = async (sceneId) => {
                const idx = scenes.findIndex(s => s.id === sceneId);
                if (idx === -1) return;
                const updated = [...scenes];
                updated[idx] = { ...updated[idx], description: editDescription, imageInstruction: editImageInstruction, isLoading: true, imageUrl: null };
                setScenes(updated);
                setEditingSceneId(null);
                try {
                    const newPrompt = await regenerateScenePrompt(editDescription, editImageInstruction);
                    const newImageUrl = await generateImage(newPrompt, (msg) => console.log(msg));
                    const final = [...scenes];
                    final[idx] = { ...final[idx], description: editDescription, imageInstruction: editImageInstruction, imagePrompt: newPrompt, imageUrl: newImageUrl, isLoading: false };
                    setScenes(final);
                } catch (error) { setErrorMsg(`수정 중 오류 발생`); const errS = [...scenes]; errS[idx] = { ...errS[idx], isLoading: false }; setScenes(errS); }
            };

            const renderLoadingState = () => (
                <div className="flex flex-col items-center justify-center p-6 sm:p-12 bg-white rounded-2xl shadow-lg border border-blue-100 animate-in fade-in zoom-in duration-300 mx-4 sm:mx-0">
                    <div className="relative">
                        <div className="w-12 h-12 sm:w-16 sm:h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <Icon name="sparkles" className="text-blue-600 animate-pulse" size={24} />
                        </div>
                    </div>
                    <h3 className="mt-4 sm:mt-6 text-lg sm:text-xl font-bold text-gray-800 text-center">{status === 'analyzing' ? '시나리오 분석 중' : '스토리보드 작화 중'}</h3>
                    <p className="mt-2 text-sm sm:text-base text-gray-500 text-center max-w-md px-2">{progress.message}</p>
                    {status === 'generating' && (
                        <div className="w-48 sm:w-64 h-2 bg-gray-100 rounded-full mt-4 overflow-hidden">
                            <div className="h-full bg-blue-600 transition-all duration-500 ease-out" style={{ width: `${(progress.current / progress.total) * 100}%` }} />
                        </div>
                    )}
                </div>
            );

            if (!isConfigured) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-gray-900">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100 animate-in fade-in zoom-in duration-500">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center p-4 bg-indigo-600 rounded-2xl shadow-lg mb-6">
                                    <Icon name="sparkles" className="text-white" size={32} />
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">AI Storyboard Maker</h1>
                                <p className="text-slate-500 mt-2 text-sm">당신의 컨셉 시나리오를 스토리보드로 만들어 드립니다.</p>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">API key를 입력해 주세요</label>
                                    <input type="password" value={userApiKey} onChange={(e) => setUserApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-2xl focus:border-indigo-600 focus:ring-0 outline-none transition-all text-center font-mono placeholder:text-slate-300" />
                                </div>
                                <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="flex items-center justify-between text-indigo-700 font-bold text-sm group">
                                        <span>새로운 API Key 발급받기</span>
                                        <Icon name="external-link" className="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
                                    </a>
                                </div>
                                <button onClick={() => userApiKey.trim() && setIsConfigured(true)} disabled={!userApiKey.trim()} className={`w-full py-4 rounded-2xl font-bold text-white shadow-md transition-all transform active:scale-95 bg-indigo-600 hover:bg-indigo-700`}>스토리보드 도구 시작</button>
                            </div>
                            <p className="mt-8 text-[10px] text-slate-400 text-center leading-relaxed">입력하신 API 키는 브라우저에 임시로만 유지되며 서버에 저장되지 않습니다.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 text-gray-900 font-sans selection:bg-blue-100 relative">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm print:hidden">
                        <div className="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-3 sm:py-0 sm:h-16 flex flex-col sm:flex-row items-center gap-3 sm:gap-0 justify-between">
                            <div className="flex flex-wrap items-center gap-2">
                                <div className="bg-blue-600 p-1.5 sm:p-2 rounded-lg shadow-sm"><Icon name="sparkles" className="text-white" size={20} /></div>
                                <h1 className="text-lg sm:text-xl font-bold tracking-tight text-gray-900">AI Storyboard Maker</h1>
                                <span className="text-[10px] sm:text-xs font-bold text-white bg-blue-600 px-1.5 py-0.5 rounded shadow-sm mr-2">Gemini Powered</span>
                                
                                {/* New Navigation Brackets */}
                                {status !== 'idle' && (
                                    <div className="flex items-center border border-gray-200 rounded-lg px-1 bg-gray-50 no-print mr-2">
                                        <button 
                                            onClick={() => setViewMode('input')}
                                            className={`p-1.5 transition-colors ${viewMode === 'input' ? 'text-gray-300 cursor-not-allowed' : 'text-blue-600 hover:bg-white rounded-md'}`}
                                            disabled={viewMode === 'input'}
                                            title="시나리오 입력으로 이동"
                                        >
                                            <Icon name="chevron-left" size={20} />
                                        </button>
                                        <div className="w-[1px] h-4 bg-gray-200 mx-1"></div>
                                        <button 
                                            onClick={() => setViewMode('results')}
                                            className={`p-1.5 transition-colors ${viewMode === 'results' ? 'text-gray-300 cursor-not-allowed' : 'text-blue-600 hover:bg-white rounded-md'}`}
                                            disabled={viewMode === 'results' || scenes.length === 0}
                                            title="스토리보드 결과로 이동"
                                        >
                                            <Icon name="chevron-right" size={20} />
                                        </button>
                                    </div>
                                )}

                                {status === 'complete' && (
                                    <div className="flex items-center gap-2 ml-1 sm:ml-4">
                                        <button onClick={handleReset} className="flex items-center gap-1.5 sm:gap-2 px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors shadow-sm"><Icon name="rotate-ccw" /> <span>다시 만들기</span></button>
                                        <button onClick={handleDownloadPdf} className="flex items-center gap-1.5 sm:gap-2 px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors shadow-sm"><Icon name="download" /> <span>PDF 저장</span></button>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center">
                                <button onClick={() => { if(confirm('설정을 초기화하시겠습니까?')) { setIsConfigured(false); setUserApiKey(""); setScenes([]); setStatus('idle'); setViewMode('input'); } }} className="text-[10px] text-slate-400 hover:text-slate-600 transition-colors underline decoration-dotted">API 키 변경</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
                        {errorMsg ? (
                            <div className="mb-6 bg-red-50 border border-red-200 rounded-lg p-3 sm:p-4 flex items-start gap-2 sm:gap-3 text-red-700 animate-in slide-in-from-top-2 alert-box">
                                <Icon name="alert-circle" className="mt-0.5 shrink-0" size={20} /><div className="flex-1"><h3 className="text-sm sm:text-base font-bold">알림</h3><p className="text-xs sm:text-sm whitespace-pre-line mt-1">{errorMsg}</p><div className="mt-2 flex gap-3">{status === 'error' && <button onClick={handleGenerate} className="text-xs sm:text-sm font-semibold underline hover:text-red-800">다시 시도하기</button>}</div></div>
                            </div>
                        ) : null}

                        {viewMode === 'input' ? (
                            <div className="max-w-3xl mx-auto animate-fade-in">
                                <div className="bg-white rounded-2xl shadow-xl p-5 sm:p-8 border border-gray-100">
                                    <div className="mb-6">
                                        <label className="block text-sm font-bold text-slate-700 mb-2">시나리오 입력</label>
                                        <textarea value={inputScenario} onChange={(e) => setInputScenario(e.target.value)} className="w-full h-48 sm:h-64 p-3 sm:p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm leading-relaxed transition-all bg-slate-50 mb-6 outline-none text-gray-500 font-normal" />
                                    </div>
                                    <div className="mb-8">
                                        <label className="block text-sm font-bold text-slate-700 mb-2">제작을 원하는 스토리보드 Scene 갯수</label>
                                        <div className="flex flex-wrap gap-2">
                                            {[3, 4, 6, 8, 10].map((num) => (
                                                <button key={num} onClick={() => setSceneCount(num)} className={`flex-1 py-2 rounded-xl text-sm font-bold border-2 transition-all ${sceneCount === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}>{num}컷</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={handleGenerate} disabled={!inputScenario.trim()} className="w-full py-3 sm:py-4 rounded-xl text-white font-bold text-base sm:text-lg flex items-center justify-center gap-2 transition-all transform active:scale-95 bg-blue-600 hover:bg-blue-700 shadow-lg hover:shadow-blue-500/30"><Icon name="sparkles" />AI 스토리보드 생성 시작</button>
                                </div>
                            </div>
                        ) : (
                            <div id="storyboard-result" className="animate-fade-in-up">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-3 sm:gap-0 mb-6 sm:mb-8 print:hidden">
                                    <div><h2 className="text-xl sm:text-2xl font-bold text-gray-900">{status === 'complete' ? '생성 완료' : '작업 진행 중...'}</h2><p className="text-xs sm:text-sm text-gray-500 mt-1">{status === 'complete' ? '모든 장면이 생성되었습니다. 이미지를 클릭하면 확대해서 볼 수 있습니다.' : `현재 ${progress.current}/${progress.total} 단계 진행 중입니다.`}</p></div>
                                </div>
                                {(status === 'analyzing') && <div className="flex justify-center py-10 sm:py-20">{renderLoadingState()}</div>}
                                {(status === 'generating' || status === 'complete' || scenes.length > 0) && (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6">
                                        {scenes.map((scene) => (
                                            <div key={scene.id} className={`bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col page-break-inside-avoid relative ${editingSceneId === scene.id ? 'ring-2 ring-blue-500' : ''}`}>
                                                {(status === 'complete' || !scene.isLoading) && <button onClick={(e) => { e.stopPropagation(); startEditing(scene); }} className="absolute top-2 right-2 p-1.5 bg-white/80 backdrop-blur-sm rounded-full text-gray-500 hover:text-blue-600 hover:bg-white transition-colors print:hidden z-10 shadow-sm"><Icon name="edit-3" /></button>}
                                                <div className="bg-gray-50 px-3 sm:px-4 py-2 border-b border-gray-100 flex justify-between items-center"><span className="font-bold text-sm sm:text-base text-gray-700 font-mono">SCENE #{scene.id.toString().padStart(2, '0')}</span>{editingSceneId === scene.id && <div className="flex gap-1 print:hidden"><button onClick={() => saveEditing(scene.id)} className="p-1 text-green-600 hover:bg-green-50 rounded"><Icon name="check" size={16} /></button><button onClick={cancelEditing} className="p-1 text-red-600 hover:bg-red-50 rounded"><Icon name="x" size={16} /></button></div>}</div>
                                                <div className="aspect-[4/3] bg-gray-50 relative group border-b border-gray-100 flex items-center justify-center overflow-hidden">{scene.isLoading ? <div className="flex flex-col items-center text-blue-500 animate-pulse"><Icon name="loader-2" className="animate-spin mb-2" /><span className="text-[10px] sm:text-xs font-medium">Drawing...</span></div> : scene.imageUrl ? <><img src={scene.imageUrl} alt={`Scene ${scene.id}`} className="w-full h-full object-cover mix-blend-multiply transition-transform duration-700 hover:scale-105 cursor-zoom-in" onClick={() => setSelectedImage(scene.imageUrl)} />{!editingSceneId && <div className="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors pointer-events-none" />}</> : <div className="flex flex-col items-center justify-center p-4 sm:p-6 text-center w-full h-full bg-gray-50"><Icon name="layout" className="text-gray-300 mb-2" size={24} /><p className="text-[10px] sm:text-xs font-bold text-gray-400">이미지 없음</p></div>}</div>
                                                <div className="p-3 sm:p-4 flex-grow flex flex-col"><h4 className="text-[10px] sm:text-xs uppercase tracking-wide text-gray-400 font-bold mb-1.5 sm:mb-2 font-mono">Description</h4>{editingSceneId === scene.id ? <textarea value={editDescription} onChange={(e) => setEditDescription(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md text-xs sm:text-sm focus:ring-blue-500 focus:border-blue-500 resize-y" rows={3}/> : <p className="text-xs sm:text-sm text-gray-700 leading-relaxed overflow-y-auto max-h-24 sm:max-h-32 scrollbar-thin scrollbar-thumb-gray-200">{scene.description}</p>}<div className="mt-3 sm:mt-4 pt-2 sm:pt-3 border-t border-gray-100 print:hidden"><div className="flex justify-between items-center mb-1"><h4 className="text-[10px] sm:text-xs uppercase tracking-wide text-gray-400 font-bold font-mono">Image Instruction</h4>{!editingSceneId && <button onClick={() => handleCopyPrompt(scene.imagePrompt)} className="text-gray-400 hover:text-blue-600 transition-colors p-1 rounded hover:bg-gray-100"><Icon name="copy" size={12} /></button>}</div>{editingSceneId === scene.id ? <textarea value={editImageInstruction} onChange={(e) => setEditImageInstruction(e.target.value)} placeholder="수정 지시를 입력하세요" className="w-full p-2 border border-gray-300 rounded-md text-[10px] sm:text-xs focus:ring-blue-500 focus:border-blue-500 resize-y" rows={2}/> : <p className="text-[9px] sm:text-[10px] text-gray-400 font-mono truncate hover:whitespace-normal hover:bg-gray-50 hover:absolute hover:z-10 hover:shadow-lg hover:p-2 hover:rounded hover:w-[calc(100%-1.5rem)] sm:hover:w-64 bg-white transition-all cursor-help" title={scene.imagePrompt}>{scene.imageInstruction || scene.imagePrompt}</p>}</div></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="hidden print:block mt-8 text-center text-xs sm:text-sm text-gray-400 border-t pt-4 font-mono uppercase tracking-widest">AI Storyboard Maker - Generated with Gemini</div>
                            </div>
                        )}

                        {/* --- 숨겨진 PDF 출력용 레이아웃 (window.print 전용) --- */}
                        <div id="hidden-pdf-layout" style={{ display: 'none' }}>
                            <div className="pdf-page">
                                <div className="flex items-center gap-3 mb-8 pb-4 border-b-2 border-gray-900"><Icon name="sparkles" size={32} />
                                    <h1 className="text-4xl font-extrabold font-mono tracking-tight text-gray-900">AI Storyboard Maker</h1>
                                </div>
                                <div className="flex-grow">
                                    <h2 className="text-xl font-bold uppercase text-gray-500 mb-4 font-mono tracking-tight">Project Scenario</h2>
                                    <div className="whitespace-pre-wrap text-lg leading-relaxed text-gray-800 font-serif border-l-4 border-gray-100 pl-6">{inputScenario}</div>
                                </div>
                                <div className="mt-auto pt-8 text-sm text-gray-400 flex justify-between font-mono uppercase border-t border-gray-100">
                                    <span>AI Storyboard Maker</span>
                                    <span>Created by Gemini 3.1 Flash</span>
                                </div>
                            </div>
                            <div className="pdf-page">
                                <h2 className="text-xl font-bold mb-6 border-b pb-2 font-mono uppercase tracking-widest">Scenes Overview</h2>
                                <div className="flex flex-col gap-8">
                                    {scenes.map(scene => (
                                        <div key={`pdf-sum-${scene.id}`} className="flex gap-6 pb-6 border-b border-gray-50 page-break-inside-avoid last:border-0">
                                            <div className="w-72 aspect-[4/3] shrink-0 border border-gray-100 bg-gray-50 overflow-hidden shadow-sm"><img src={scene.imageUrl} className="w-full h-full object-cover" /></div>
                                            <div className="flex-1 flex flex-col">
                                                <h3 className="font-bold text-xl font-mono mb-2 text-blue-600">SCENE #{scene.id.toString().padStart(2, '0')}</h3>
                                                <p className="text-md text-gray-700 leading-relaxed font-medium">{scene.description}</p>
                                                <div className="mt-auto bg-gray-50 p-2 text-[8px] text-gray-300 font-mono break-all uppercase border border-gray-100 leading-tight">PROMPT: {scene.imagePrompt}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {scenes.map(scene => (
                                <div key={`pdf-full-${scene.id}`} className="pdf-page flex items-center justify-center">
                                    <div className="w-full">
                                        <div className="mb-6 font-mono font-bold text-3xl text-gray-900 tracking-tighter border-b-2 border-gray-900 inline-block pb-1">SCENE #{scene.id}</div>
                                        <div className="aspect-[4/3] w-full border border-gray-100 shadow-md mb-8 overflow-hidden bg-gray-50"><img src={scene.imageUrl} className="w-full h-full object-cover" /></div>
                                        <div className="bg-gray-50 p-8 rounded-lg border border-gray-100">
                                            <h4 className="text-xs font-bold text-gray-400 uppercase mb-2 font-mono">Description</h4>
                                            <p className="text-2xl text-gray-800 font-serif leading-relaxed text-center italic">{scene.description}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {selectedImage && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4 transition-all animate-in fade-in" onClick={() => setSelectedImage(null)}>
                                <div className="relative max-w-5xl max-h-full">
                                    <img src={selectedImage} className="max-w-full max-h-[90vh] rounded-lg shadow-2xl border-4 border-white/10" />
                                    <button className="absolute -top-12 right-0 text-white hover:text-gray-300 transition-colors bg-white/10 p-2 rounded-full"><Icon name="x" size={32}/></button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StoryboardApp />);
    </script>
</body>
</html>
